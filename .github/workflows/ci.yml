name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test core engine
        run: cargo test -p etchy-core -p etchy-helper
      - name: Clippy
        run: |
          rustup component add clippy
          cargo clippy -p etchy-core -p etchy-helper -- -D warnings
