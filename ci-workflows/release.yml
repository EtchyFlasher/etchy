name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            args: "--bundles deb,appimage"
          - os: windows-latest
            args: "--bundles nsis"
          - os: macos-latest
            args: "--bundles dmg --target universal-apple-darwin"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      # Build the privileged helper and stage it where Tauri's bundler
      # expects sidecars: src-tauri/binaries/etchy-helper-<target-triple>[.exe]
      - name: Build & stage helper sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "$RUNNER_OS" == "macOS" ]; then
            cargo build --release -p etchy-helper --target aarch64-apple-darwin
            cargo build --release -p etchy-helper --target x86_64-apple-darwin
            lipo -create -output src-tauri/binaries/etchy-helper-universal-apple-darwin \
              target/aarch64-apple-darwin/release/etchy-helper \
              target/x86_64-apple-darwin/release/etchy-helper
            # Universal builds compile per-arch first; Tauri resolves the
            # sidecar by EACH arch's triple, so provide it under all names.
            cp src-tauri/binaries/etchy-helper-universal-apple-darwin \
               src-tauri/binaries/etchy-helper-aarch64-apple-darwin
            cp src-tauri/binaries/etchy-helper-universal-apple-darwin \
               src-tauri/binaries/etchy-helper-x86_64-apple-darwin
          elif [ "$RUNNER_OS" == "Windows" ]; then
            cargo build --release -p etchy-helper
            cp target/release/etchy-helper.exe src-tauri/binaries/etchy-helper-x86_64-pc-windows-msvc.exe
          else
            cargo build --release -p etchy-helper
            cp target/release/etchy-helper src-tauri/binaries/etchy-helper-x86_64-unknown-linux-gnu
          fi

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Etchy ${{ github.ref_name }}"
          releaseBody: "See the README for details. All builds include mandatory read-back verification."
          releaseDraft: true
          args: ${{ matrix.args }}
